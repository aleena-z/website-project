<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard</title>
    <style>
       *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),
    url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* Navbar */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 50px;
    background:rgba(0,0,0,0.25);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.15);
}

.navbar h1{
    color:white;
    font-size:24px;
}

.navbar button{
    background:linear-gradient(135deg,#4a90e2,#6a5acd);
    color:white;
    border:none;
    padding:10px 22px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

.navbar button:hover{
    transform:translateY(-2px);
}

/* Main Container */

.container{
    max-width:900px;
    margin:60px auto;
    padding:20px;
}

h2{
    color:white;
    text-align:center;
    margin-bottom:25px;
    font-size:34px;
}

/* Profile Card */

.profile-card{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    border-radius:25px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

table{
    width:100%;
    border-collapse:collapse;
}

table tr td{
    padding:18px 25px;
    border-bottom:1px solid rgba(255,255,255,0.15);
}

table tr:last-child td{
    border-bottom:none;
}

table tr td:first-child{
    color:#ffffff;
    font-weight:600;
    width:35%;
    background:rgba(255,255,255,0.08);
}

table tr td:last-child{
    color:#f5f5f5;
}

/* Note */

.note{
    margin-top:25px;
    padding:15px;
    border-radius:12px;
    background:rgba(255,255,255,0.15);
    color:white;
    text-align:center;
    backdrop-filter:blur(10px);
}

/* Book Trip Button */

.trip-btn{
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;
    padding:14px 30px;
    text-decoration:none;
    border-radius:12px;
    display:inline-block;
    font-weight:600;
    transition:0.3s;
    box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

.trip-btn:hover{
    transform:translateY(-3px);
}
    </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <h1>Travel Website — Dashboard</h1>
    <button onclick="handleLogout()">Logout</button>
</div>

<!-- Content -->
<div class="container">
    <h2>My Profile</h2>

    <div class="profile-card">
        <table>
            <tr><td>Username</td>  <td id="detailUsername">—</td></tr>
            <tr><td>Email</td>     <td id="detailEmail">—</td></tr>
            <tr><td>Phone</td>     <td id="detailPhone">—</td></tr>
            <tr><td>Address</td>   <td id="detailAddress">—</td></tr>
            <tr><td>Date of Birth</td><td id="detailDob">—</td></tr>
        </table>
    </div>

    <p class="note">You can only view your own information. Contact admin for any changes.</p>
</div>
<div style="margin-top:30px; text-align:center;">
    <a href="booking.html" class="trip-btn">
        ✈️ Book Your Dream Trip
    </a>
</div>

<script>
    window.onload = function () {
        const userData = localStorage.getItem("loggedInUser");
        if (!userData) {
            window.location.href = "login.html";
            return;
        }

        const user = JSON.parse(userData);

        document.getElementById("detailUsername").textContent = user.username;
        document.getElementById("detailEmail").textContent    = user.email;
        document.getElementById("detailPhone").textContent    = user.phone    || "Not provided";
        document.getElementById("detailAddress").textContent  = user.address  || "Not provided";
        document.getElementById("detailDob").textContent      = user.dob      || "Not provided";
    };

    function handleLogout() {
        localStorage.removeItem("loggedInUser");
        window.location.href = "login.html";
    }
</script>

</body>
</html>
